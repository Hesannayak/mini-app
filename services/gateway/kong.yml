_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://auth:3000
    routes:
      - name: auth-routes
        paths:
          - /api/v1/auth
        strip_path: false
        methods:
          - POST

  - name: payments-service
    url: http://payments:3001
    routes:
      - name: payment-routes
        paths:
          - /api/v1/payments
        strip_path: false
        methods:
          - GET
          - POST

  - name: voice-service
    url: http://voice:3002
    routes:
      - name: voice-routes
        paths:
          - /api/v1/voice
        strip_path: false
        methods:
          - GET
          - POST

  - name: intelligence-service
    url: http://intelligence:3003
    routes:
      - name: transaction-routes
        paths:
          - /api/v1/transactions
          - /api/v1/score
          - /api/v1/budgets
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE

  - name: coach-service
    url: http://coach:3004
    routes:
      - name: coach-routes
        paths:
          - /api/v1/coach
        strip_path: false
        methods:
          - GET
          - POST

  - name: notifications-service
    url: http://notifications:3005
    routes:
      - name: notification-routes
        paths:
          - /api/v1/notifications
        strip_path: false
        methods:
          - GET
          - POST
          - PUT

plugins:
  - name: rate-limiting
    config:
      minute: 100
      policy: redis
      redis_host: redis
      redis_port: 6379

  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
      max_age: 3600

  - name: jwt
    config:
      uri_param_names:
        - jwt
      claims_to_verify:
        - exp
    route: payment-routes

  - name: jwt
    config:
      uri_param_names:
        - jwt
      claims_to_verify:
        - exp
    route: voice-routes

  - name: jwt
    config:
      uri_param_names:
        - jwt
      claims_to_verify:
        - exp
    route: transaction-routes

  - name: jwt
    config:
      uri_param_names:
        - jwt
      claims_to_verify:
        - exp
    route: coach-routes

  - name: jwt
    config:
      uri_param_names:
        - jwt
      claims_to_verify:
        - exp
    route: notification-routes
